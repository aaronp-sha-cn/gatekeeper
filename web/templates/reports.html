{% extends "base.html" %}

{% block title %}报表中心{% endblock %}

{% block content %}
<style>
.report-section { margin-bottom: 24px; }
.report-section-title { color: var(--primary); font-size: 15px; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 12px; }
.report-stats { display: flex; gap: 12px; flex-wrap: wrap; margin: 10px 0; }
.report-stat-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; text-align: center; min-width: 90px; }
.report-stat-value { font-size: 22px; font-weight: 700; }
.report-stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.report-table { width: 100%; border-collapse: collapse; margin: 8px 0; }
.report-table th, .report-table td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; font-size: 13px; }
.report-table th { background: var(--bg-secondary); color: var(--text-muted); font-weight: 600; }
.report-table tr:hover { background: rgba(37,99,235,0.05); }
.report-kv-item { display: flex; padding: 8px 0; border-bottom: 1px solid rgba(51,65,85,0.3); }
.report-kv-key { width: 160px; color: var(--text-muted); font-size: 13px; flex-shrink: 0; }
.report-kv-val { color: var(--text); font-size: 13px; }
.report-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
</style>
<div class="reports-page">
    <div class="report-actions">
        <h3>生成报表</h3>
        <div class="report-form">
            <div class="form-group">
                <label>报表类型</label>
                <select id="report-type">
                    <option value="daily">每日安全报告</option>
                    <option value="security">安全审计报告</option>
                    <option value="traffic">流量分析报告</option>
                </select>
            </div>
            <div class="form-group">
                <label>开始日期</label>
                <input type="date" id="date-from">
            </div>
            <div class="form-group">
                <label>结束日期</label>
                <input type="date" id="date-to">
            </div>
            <div class="form-group">
                <label>快捷选择</label>
                <div style="display: flex; gap: 6px; flex-wrap: wrap;">
                    <button class="btn btn-sm date-shortcut" onclick="setDateRange(0)">今天</button>
                    <button class="btn btn-sm date-shortcut" onclick="setDateRange(1)">昨天</button>
                    <button class="btn btn-sm date-shortcut" onclick="setDateRange(7)">近7天</button>
                    <button class="btn btn-sm date-shortcut" onclick="setDateRange(30)">近30天</button>
                    <button class="btn btn-sm date-shortcut" onclick="setDateRange(90)">近90天</button>
                </div>
            </div>
            <button onclick="generateReport()" class="btn btn-primary">生成报表</button>
            <button onclick="exportPDF()" class="btn btn-secondary">导出PDF</button>
        </div>
    </div>

    <div class="report-result" id="report-result" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 id="report-title" style="color: var(--text);">报表预览</h3>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-sm btn-secondary" onclick="printReport()">打印</button>
                <button class="btn btn-sm btn-primary" onclick="exportPDF()">导出PDF</button>
            </div>
        </div>
        <div id="report-meta" style="color: var(--text-muted); font-size: 12px; margin-bottom: 15px;"></div>
        <div id="report-content" class="report-content"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 日期快捷选择
function formatDate(d) {
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
}

function setDateRange(days) {
    var end = new Date();
    var start = new Date();
    if (days === 1) {
        // 昨天
        end.setDate(end.getDate() - 1);
        start.setDate(start.getDate() - 1);
    } else if (days > 1) {
        start.setDate(start.getDate() - days + 1);
    }
    document.getElementById('date-from').value = formatDate(start);
    document.getElementById('date-to').value = formatDate(end);
}

// 初始化默认日期为近7天
(function() {
    setDateRange(7);
})();

var lastReportData = null;

function showToast(msg, type) {
    var toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:6px;color:#fff;font-size:14px;z-index:9999;opacity:0;transition:opacity 0.3s;';
    toast.style.background = type === 'error' ? '#dc2626' : type === 'warning' ? '#f59e0b' : '#16a34a';
    toast.textContent = msg;
    document.body.appendChild(toast);
    requestAnimationFrame(function() { toast.style.opacity = '1'; });
    setTimeout(function() { toast.style.opacity = '0'; setTimeout(function() { toast.remove(); }, 300); }, 3000);
}

function generateReport() {
    var type = document.getElementById('report-type').value;
    var dateFrom = document.getElementById('date-from').value;
    var dateTo = document.getElementById('date-to').value;

    if (!dateFrom || !dateTo) {
        showToast('请选择日期范围', 'warning');
        return;
    }

    var btn = event.target;
    btn.disabled = true;
    btn.textContent = '生成中...';

    fetch('/reports/api/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({type: type, date_from: dateFrom, date_to: dateTo})
    })
    .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
    })
    .then(function(data) {
        btn.disabled = false;
        btn.textContent = '生成报表';
        if (data.status === 'ok') {
            lastReportData = data.data;
            renderReportPreview(data.data);
            showToast('报表生成成功');
        } else {
            showToast('生成失败: ' + (data.message || '未知错误'), 'error');
        }
    })
    .catch(function(e) {
        btn.disabled = false;
        btn.textContent = '生成报表';
        showToast('请求失败: ' + e.message, 'error');
    });
}

function renderReportPreview(report) {
    document.getElementById('report-result').style.display = 'block';
    document.getElementById('report-title').textContent = report.title || '报表预览';
    document.getElementById('report-meta').innerHTML =
        '生成时间: ' + (report.generated_at ? new Date(report.generated_at).toLocaleString('zh-CN') : '--') +
        ' &nbsp;|&nbsp; 报表类型: ' + (report.type || '--');

    var html = '';
    var sections = report.sections || {};
    var sectionNames = {
        'alerts': '告警摘要',
        'traffic': '流量摘要',
        'vulnerabilities': '漏洞摘要',
        'firewall': '防火墙摘要',
        'threat_intel': '威胁情报',
        'scans': '扫描摘要',
        'alert_analysis': '告警分析',
        'vuln_trend': '漏洞趋势',
        'defense_effectiveness': '防御效果',
        'recommendations': '安全建议',
        'traffic_overview': '流量概览',
        'protocol_distribution': '协议分布',
        'top_sources': 'Top 源地址',
        'top_destinations': 'Top 目标地址',
    };

    Object.keys(sections).forEach(function(key) {
        var section = sections[key];
        var name = sectionNames[key] || key;
        html += '<div class="report-section">';
        html += '<h4 class="report-section-title">' + escapeHtml(name) + '</h4>';

        if (typeof section === 'object' && section !== null) {
            if (section.total !== undefined || section.critical !== undefined || section.high !== undefined) {
                // 告警类统计
                html += '<div class="report-stats">';
                if (section.total !== undefined) html += statCard('总数', section.total, 'var(--text)');
                if (section.critical !== undefined) html += statCard('严重', section.critical, '#dc2626');
                if (section.high !== undefined) html += statCard('高危', section.high, '#f59e0b');
                if (section.medium !== undefined) html += statCard('中危', section.medium, '#0ea5e9');
                if (section.low !== undefined) html += statCard('低危', section.low, '#64748b');
                if (section.blocked !== undefined) html += statCard('已拦截', section.blocked, '#16a34a');
                if (section.passed !== undefined) html += statCard('已通过', section.passed, '#16a34a');
                if (section.failed !== undefined) html += statCard('失败', section.failed, '#dc2626');
                html += '</div>';
            } else if (Array.isArray(section.items || section.list || section.rules || section.recommendations)) {
                // 列表类
                var items = section.items || section.list || section.rules || section.recommendations || [];
                if (items.length > 0) {
                    html += renderTable(items);
                } else {
                    html += '<p style="color:var(--text-muted);">暂无数据</p>';
                }
            } else if (section.summary || section.description) {
                html += '<p style="color:var(--text);line-height:1.6;">' + escapeHtml(section.summary || section.description) + '</p>';
            } else {
                // 通用键值对
                html += renderKeyValue(section);
            }
        }
        html += '</div>';
    });

    document.getElementById('report-content').innerHTML = html || '<p style="color:var(--text-muted);">暂无报表数据</p>';
    document.getElementById('report-result').scrollIntoView({behavior: 'smooth'});
}

function statCard(label, value, color) {
    return '<div class="report-stat-card"><div class="report-stat-value" style="color:' + color + ';">' + value + '</div><div class="report-stat-label">' + escapeHtml(label) + '</div></div>';
}

function renderTable(items) {
    if (!items || items.length === 0) return '<p style="color:var(--text-muted);">暂无数据</p>';
    var keys = Object.keys(items[0]);
    var html = '<div style="overflow-x:auto;"><table class="report-table"><thead><tr>';
    keys.forEach(function(k) { html += '<th>' + escapeHtml(k) + '</th>'; });
    html += '</tr></thead><tbody>';
    items.forEach(function(item) {
        html += '<tr>';
        keys.forEach(function(k) {
            var v = item[k];
            if (typeof v === 'object') v = JSON.stringify(v);
            html += '<td>' + escapeHtml(String(v || '--')) + '</td>';
        });
        html += '</tr>';
    });
    html += '</tbody></table></div>';
    return html;
}

function renderKeyValue(obj) {
    var html = '<div class="report-kv">';
    Object.keys(obj).forEach(function(k) {
        var v = obj[k];
        if (typeof v === 'object') v = JSON.stringify(v, null, 2);
        html += '<div class="report-kv-item"><span class="report-kv-key">' + escapeHtml(k) + '</span><span class="report-kv-val">' + escapeHtml(String(v || '--')) + '</span></div>';
    });
    html += '</div>';
    return html;
}

function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function printReport() {
    var content = document.getElementById('report-content').innerHTML;
    var title = document.getElementById('report-title').textContent;
    var win = window.open('', '_blank');
    win.document.write('<html><head><title>' + title + '</title><style>body{font-family:sans-serif;padding:20px;color:#333;}h4{color:#1e293b;border-bottom:1px solid #e2e8f0;padding-bottom:6px;}table{width:100%;border-collapse:collapse;margin:10px 0;}th,td{border:1px solid #e2e8f0;padding:6px 10px;text-align:left;font-size:13px;}th{background:#f1f5f9;}.report-stats{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0;}.report-stat-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:10px 16px;text-align:center;min-width:80px;}.report-stat-value{font-size:20px;font-weight:700;}.report-stat-label{font-size:11px;color:#64748b;margin-top:2px;}.report-kv-item{display:flex;padding:6px 0;border-bottom:1px solid #f1f5f9;}.report-kv-key{width:150px;color:#64748b;font-size:13px;}.report-kv-val{color:#334155;font-size:13px;}</style></head><body>');
    win.document.write('<h2>' + title + '</h2>');
    win.document.write(content);
    win.document.write('</body></html>');
    win.document.close();
    win.print();
}

function exportPDF() {
    var type = document.getElementById('report-type').value;
    showToast('正在生成PDF...', 'info');

    fetch('/reports/api/export/pdf', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({type: type})
    })
    .then(function(response) {
        if (!response.ok) {
            return response.json().then(function(err) {
                throw new Error(err.message || 'PDF生成失败 (HTTP ' + response.status + ')');
            }).catch(function() {
                throw new Error('PDF生成失败 (HTTP ' + response.status + ')');
            });
        }
        return response.blob();
    })
    .then(function(blob) {
        var url = window.URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'gatekeeper_report_' + type + '_' + new Date().toISOString().slice(0,10) + '.pdf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
        showToast('PDF导出成功');
    })
    .catch(function(err) {
        showToast(err.message, 'error');
    });
}
</script>
{% endblock %}
