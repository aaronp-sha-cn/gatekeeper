{% extends "base.html" %}

{% block title %}漏洞扫描{% endblock %}

{% block content %}
<!-- 统计概览 -->
<div class="stats-grid">
    <div class="stat-card">
        <h3>总扫描次数</h3>
        <div class="value" id="stat-total-scans">-</div>
    </div>
    <div class="stat-card">
        <h3>发现漏洞</h3>
        <div class="value" id="stat-total-vulns">-</div>
    </div>
    <div class="stat-card critical">
        <h3>高危漏洞</h3>
        <div class="value" id="stat-critical-vulns">-</div>
    </div>
    <div class="stat-card warning">
        <h3>待修复</h3>
        <div class="value" id="stat-unfixed-vulns">-</div>
    </div>
</div>

<!-- 扫描控制面板 -->
<div class="section">
    <h2>扫描控制</h2>
    <div class="scan-control">
        <div class="scan-form-row">
            <div class="form-group">
                <label>扫描目标</label>
                <input type="text" id="scan-target" placeholder="IP地址、域名或CIDR (如 192.168.1.0/24)">
            </div>
            <div class="form-group">
                <label>扫描类型</label>
                <select id="scan-type">
                    <option value="quick">快速扫描 (常见端口)</option>
                    <option value="full">全端口扫描 (1-1024)</option>
                    <option value="custom">自定义端口</option>
                </select>
            </div>
            <div class="form-group" id="ports-group" style="display: none;">
                <label>端口范围</label>
                <input type="text" id="scan-ports" placeholder="如: 80,443,3306 或 1-1024">
            </div>
        </div>
        <div class="scan-actions">
            <button class="btn btn-primary" id="btn-start-scan" onclick="startScan()">开始扫描</button>
            <button class="btn btn-danger" id="btn-stop-scan" onclick="stopScan()" style="display: none;">停止扫描</button>
        </div>
    </div>

    <!-- 扫描进度 -->
    <div class="scan-progress" id="scan-progress" style="display: none;">
        <div class="progress-info">
            <span id="progress-status">扫描中...</span>
            <span id="progress-detail"></span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
        </div>
    </div>
</div>

<!-- 严重度分布 + 扫描历史 -->
<div class="section-grid">
    <!-- 严重度分布饼图 -->
    <div class="section">
        <h2>漏洞分布</h2>
        <div class="chart-container">
            <canvas id="severity-chart"></canvas>
        </div>
    </div>

    <!-- 扫描历史 -->
    <div class="section">
        <h2>扫描历史</h2>
        <div class="history-list" id="scan-history">
            <p style="color: var(--text-muted);">加载中...</p>
        </div>
    </div>
</div>

<!-- 漏洞结果表格 -->
<div class="section">
    <h2>漏洞结果</h2>
    <div class="result-filters">
        <select id="filter-severity" onchange="loadResults()">
            <option value="">全部严重度</option>
            <option value="critical">严重</option>
            <option value="high">高危</option>
            <option value="medium">中危</option>
            <option value="low">低危</option>
            <option value="info">信息</option>
        </select>
    </div>
    <table>
        <thead>
            <tr>
                <th>主机</th>
                <th>端口</th>
                <th>服务</th>
                <th>漏洞名称</th>
                <th>CVE</th>
                <th>CVSS</th>
                <th>严重度</th>
                <th>修复建议</th>
            </tr>
        </thead>
        <tbody id="vuln-results">
            <tr><td colspan="8" style="text-align: center; color: var(--text-muted);">加载中...</td></tr>
        </tbody>
    </table>
    <div class="pagination" id="pagination"></div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    /* 统计卡片 */
    .stat-card .value { color: #60a5fa; }
    .stat-card.warning .value { color: #fcd34d; }

    /* 区块标题 */
    .section h2 { color: var(--primary); margin-bottom: 15px; font-size: 18px; }

    /* 扫描控制 */
    .scan-form-row {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        margin-bottom: 15px;
    }
    .scan-form-row .form-group {
        flex: 1;
        min-width: 200px;
    }
    .scan-form-row label {
        display: block;
        color: var(--text-muted);
        font-size: 13px;
        margin-bottom: 5px;
    }
    .scan-form-row input,
    .scan-form-row select {
        width: 100%;
        padding: 8px 12px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-size: 14px;
    }
    .scan-actions {
        display: flex;
        gap: 10px;
    }

    /* 进度条 */
    .scan-progress {
        margin-top: 15px;
    }
    .progress-info {
        display: flex;
        justify-content: space-between;
        margin-bottom: 5px;
        font-size: 13px;
        color: var(--text-muted);
    }
    .progress-bar {
        width: 100%;
        height: 8px;
        background: var(--border);
        border-radius: 4px;
        overflow: hidden;
    }
    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #2563eb, #60a5fa);
        border-radius: 4px;
        transition: width 0.3s ease;
    }

    /* 双列布局 */
    .section-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    /* 图表容器 */
    .chart-container {
        width: 100%;
        max-width: 300px;
        margin: 0 auto;
    }

    /* 扫描历史 */
    .history-list {
        max-height: 300px;
        overflow-y: auto;
    }
    .history-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
    }
    .history-item:hover {
        background: rgba(37, 99, 235, 0.05);
    }
    .history-item .target {
        font-weight: 600;
        color: var(--text);
    }
    .history-item .meta {
        color: var(--text-muted);
    }
    .history-item .vuln-count {
        font-weight: bold;
    }

    /* 数据表格 */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
    th { color: var(--text-muted); font-weight: 600; position: sticky; top: 0; background: var(--bg); }
    tr:hover { background: rgba(37, 99, 235, 0.05); }

    /* 严重度标签 */
    .severity-critical { color: #fca5a5; font-weight: bold; }
    .severity-high { color: #fb923c; font-weight: bold; }
    .severity-medium { color: #fcd34d; }
    .severity-low { color: #86efac; }
    .severity-info { color: #60a5fa; }

    /* 过滤器 */
    .result-filters {
        margin-bottom: 15px;
    }
    .result-filters select {
        padding: 6px 12px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
    }

    /* 分页 */
    .pagination {
        display: flex;
        justify-content: center;
        gap: 5px;
        margin-top: 15px;
    }
    .pagination button {
        padding: 6px 12px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        cursor: pointer;
    }
    .pagination button.active {
        background: var(--primary);
        border-color: var(--primary);
        color: white;
    }
    .pagination button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    /* 表格容器 */
    .section table {
        max-height: 500px;
        display: block;
        overflow-y: auto;
    }
    .section thead, .section tbody {
        display: table;
        width: 100%;
        table-layout: fixed;
    }

    /* 修复建议列 */
    .solution-text {
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .solution-text:hover {
        white-space: normal;
        word-break: break-all;
    }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
    function escapeHtml(str) {
    if (!str) return '';
    return str.toString()
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

let currentPage = 1;
    let severityChart = null;
    let statusTimer = null;

    // ---- 统计信息 ----
    function loadStats() {
        fetch('/vuln-scan/api/stats')
            .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
            .then(data => {
                if (data.status === 'ok') {
                    const d = data.data;
                    document.getElementById('stat-total-scans').textContent = d.total_scans;
                    document.getElementById('stat-total-vulns').textContent = d.total_vulns;
                    document.getElementById('stat-critical-vulns').textContent = d.critical_vulns + d.high_vulns;
                    document.getElementById('stat-unfixed-vulns').textContent = d.unfixed_vulns;

                    // 更新饼图
                    updateChart(d.severity_distribution);
                }
            });
    }

    // ---- 饼图 ----
    function updateChart(distribution) {
        const ctx = document.getElementById('severity-chart').getContext('2d');
        const labels = [];
        const values = [];
        const colors = [];
        const colorMap = {
            'info': '#60a5fa', 'low': '#86efac', 'medium': '#fcd34d',
            'high': '#fb923c', 'critical': '#fca5a5'
        };
        const nameMap = {
            'info': '信息', 'low': '低危', 'medium': '中危',
            'high': '高危', 'critical': '严重'
        };

        for (const [key, val] of Object.entries(distribution)) {
            if (val > 0) {
                labels.push(nameMap[key] || key);
                values.push(val);
                colors.push(colorMap[key] || '#888');
            }
        }

        if (severityChart) {
            severityChart.data.labels = labels;
            severityChart.data.datasets[0].data = values;
            severityChart.data.datasets[0].backgroundColor = colors;
            severityChart.update();
        } else {
            severityChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#94a3b8', padding: 15, font: { size: 12 } }
                        }
                    }
                }
            });
        }
    }

    // ---- 扫描控制 ----
    document.getElementById('scan-type').addEventListener('change', function() {
        const portsGroup = document.getElementById('ports-group');
        portsGroup.style.display = this.value === 'custom' ? 'block' : 'none';
    });

    function startScan() {
        const target = document.getElementById('scan-target').value.trim();
        if (!target) { alert('请输入扫描目标'); return; }

        const scanType = document.getElementById('scan-type').value;
        const ports = document.getElementById('scan-ports').value.trim();

        const body = { target: target, scan_type: scanType };
        if (scanType === 'custom' && ports) {
            body.ports = ports;
        }

        fetch('/vuln-scan/api/scan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        })
        .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(data => {
            if (data.status === 'ok') {
                document.getElementById('btn-start-scan').style.display = 'none';
                document.getElementById('btn-stop-scan').style.display = 'inline-block';
                document.getElementById('scan-progress').style.display = 'block';
                startStatusPolling();
            } else {
                alert('启动扫描失败: ' + (data.message || '未知错误'));
            }
        })
        .catch(e => {
            alert('请求失败: ' + e.message);
        });
    }

    function stopScan() {
        fetch('/vuln-scan/api/scan/stop', { method: 'POST' })
            .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
            .then(data => {
                if (data.status === 'ok') {
                    document.getElementById('btn-start-scan').style.display = 'inline-block';
                    document.getElementById('btn-stop-scan').style.display = 'none';
                    stopStatusPolling();
                    loadStats();
                    loadHistory();
                    loadResults();
                }
            });
    }

    // ---- 扫描状态轮询 ----
    function startStatusPolling() {
        if (statusTimer) clearInterval(statusTimer);
        statusTimer = setInterval(pollStatus, 2000);
        pollStatus();
    }

    function stopStatusPolling() {
        if (statusTimer) {
            clearInterval(statusTimer);
            statusTimer = null;
        }
    }

    function pollStatus() {
        fetch('/vuln-scan/api/scan/status')
            .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
            .then(data => {
                if (data.status === 'ok') {
                    const s = data.data;
                    const statusEl = document.getElementById('progress-status');
                    const detailEl = document.getElementById('progress-detail');
                    const fillEl = document.getElementById('progress-fill');

                    const statusText = {
                        'running': '扫描中...',
                        'completed': '扫描完成',
                        'failed': '扫描失败',
                        'cancelled': '已取消',
                        'idle': '空闲'
                    };

                    statusEl.textContent = statusText[s.status] || s.status;

                    if (s.total_hosts > 0) {
                        const pct = Math.round((s.scanned_hosts / s.total_hosts) * 100);
                        fillEl.style.width = pct + '%';
                        detailEl.textContent = s.current_host + ' (' + s.scanned_hosts + '/' + s.total_hosts + ') | 漏洞: ' + s.found_vulns;
                    }

                    if (s.status === 'completed' || s.status === 'failed' || s.status === 'cancelled') {
                        stopStatusPolling();
                        document.getElementById('btn-start-scan').style.display = 'inline-block';
                        document.getElementById('btn-stop-scan').style.display = 'none';
                        loadStats();
                        loadHistory();
                        loadResults();
                    }
                }
            });
    }

    // ---- 漏洞结果 ----
    function loadResults(page) {
        page = page || 1;
        currentPage = page;
        const severity = document.getElementById('filter-severity').value;

        let url = '/vuln-scan/api/results?page=' + page + '&per_page=20';
        if (severity) url += '&severity=' + severity;

        fetch(url)
            .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
            .then(data => {
                const tbody = document.getElementById('vuln-results');
                if (data.status === 'ok' && data.data.results.length > 0) {
                    tbody.innerHTML = data.data.results.map(v => `
                        <tr>
                            <td>${v.host}</td>
                            <td>${v.port || '-'}</td>
                            <td>${v.service || '-'}</td>
                            <td title="${v.description || ''}">${v.name || '-'}</td>
                            <td>${v.cve_id || '-'}</td>
                            <td>${v.cvss_score ? v.cvss_score.toFixed(1) : '-'}</td>
                            <td class="severity-${v.severity}">${v.severity}</td>
                            <td class="solution-text" title="${v.solution || ''}">${v.solution || '-'}</td>
                        </tr>
                    `).join('');

                    // 分页
                    renderPagination(data.data.total, data.data.per_page, page);
                } else {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: var(--text-muted);">暂无漏洞记录</td></tr>';
                    document.getElementById('pagination').innerHTML = '';
                }
            });
    }

    function renderPagination(total, perPage, current) {
        const totalPages = Math.ceil(total / perPage);
        const container = document.getElementById('pagination');
        if (totalPages <= 1) { container.innerHTML = ''; return; }

        let html = '<button ' + (current <= 1 ? 'disabled' : '') + ' onclick="loadResults(' + (current - 1) + ')">上一页</button>';
        for (let i = 1; i <= totalPages && i <= 10; i++) {
            html += '<button class="' + (i === current ? 'active' : '') + '" onclick="loadResults(' + i + ')">' + i + '</button>';
        }
        html += '<button ' + (current >= totalPages ? 'disabled' : '') + ' onclick="loadResults(' + (current + 1) + ')">下一页</button>';
        container.innerHTML = html;
    }

    // ---- 扫描历史 ----
    function loadHistory() {
        fetch('/vuln-scan/api/history?limit=10')
            .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
            .then(data => {
                const container = document.getElementById('scan-history');
                if (data.status === 'ok' && data.data.length > 0) {
                    container.innerHTML = data.data.map(h => {
                        const statusColor = {
                            'completed': '#86efac', 'running': '#60a5fa',
                            'failed': '#fca5a5', 'cancelled': '#fcd34d', 'pending': '#94a3b8'
                        };
                        const color = statusColor[h.status] || '#94a3b8';
                        const time = h.created_at ? new Date(h.created_at).toLocaleString() : '-';
                        return `
                            <div class="history-item">
                                <div>
                                    <span class="target">${h.target}</span>
                                    <span class="meta"> | ${h.scan_type || 'quick'} | ${time}</span>
                                </div>
                                <div>
                                    <span class="vuln-count" style="color: ${color};">${h.total_vulns} 漏洞</span>
                                    <span class="meta" style="color: ${color};">[${h.status}]</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<p style="color: var(--text-muted);">暂无扫描历史</p>';
                }
            });
    }

    // ---- 初始化 ----
    loadStats();
    loadHistory();
    loadResults();

    // 定时刷新
    setInterval(loadStats, 60000);
    setInterval(loadHistory, 60000);
</script>
{% endblock %}
