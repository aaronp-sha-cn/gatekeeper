name: GateKeeper CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: 代码检查 (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: 运行 flake8
        run: |
          # 停止构建如果有 Python 语法错误或未定义的名称
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero 将所有错误视为警告。GitHub 编辑器是 127 chars 宽
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  security:
    name: 安全扫描 (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: 运行 Bandit 安全扫描
        run: bandit -r . -x tests/ -ll -f json -o bandit-report.json

      - name: 运行 pip-audit 依赖检查
        run: pip-audit -r requirements.txt --desc

      - name: 上传安全扫描报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

  test:
    name: 单元测试 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 缓存 pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: 运行单元测试
        env:
          GK_DB_DRIVER: sqlite
          GK_WEB_SSL_ENABLED: "false"
          GK_WEB_SECRET_KEY: ci-test-secret-key
          GK_LOG_LEVEL: WARNING
          GK_LOG_CONSOLE: "false"
          GK_LOG_FILE_OUTPUT: "false"
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing --cov-report=html --cov-fail-under=60

      - name: 上传覆盖率报告
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/

  integration-test:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: 运行集成测试
        env:
          GK_DB_DRIVER: sqlite
          GK_WEB_SSL_ENABLED: "false"
          GK_WEB_SECRET_KEY: ci-integration-test-key
          GK_LOG_LEVEL: WARNING
          GK_LOG_CONSOLE: "false"
          GK_LOG_FILE_OUTPUT: "false"
        run: |
          python -m pytest tests/ -v --tb=short -m "integration" --cov=. --cov-report=term-missing

  build-status:
    name: 构建状态
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test, security]
    steps:
      - name: 检查所有任务是否通过
        if: needs.lint.result == 'success' && needs.test.result == 'success' && needs.security.result == 'success'
        run: echo "所有检查通过"

      - name: 标记失败
        if: needs.lint.result != 'success' || needs.test.result != 'success' || needs.security.result != 'success'
        run: |
          echo "构建失败"
          exit 1
