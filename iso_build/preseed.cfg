# ============================================================
# GateKeeper - Debian Preseed 自动化配置
# 用于Debian 10 (Buster) 自动化安装
# ============================================================

# 跳过 CD-ROM 检测，支持 USB/无光盘安装
d-i debian-installer/cdrom-detect/try-usb boolean true
d-i debian-installer/cdrom-detect/cdrom-detect boolean false
d-i cdrom-detect/load_media boolean false
d-i cdrom-detect/cdrom_device string /dev/sda
d-i cdrom-detect/cdrom_fs_type string iso9660

# 语言和区域设置
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# 网络配置 - 完全跳过网络配置（离线安装）
d-i netcfg/choose_interface select auto
d-i netcfg/link_wait_timeout string 5
d-i netcfg/dhcp_timeout string 5
d-i netcfg/dhcp_failed note
d-i netcfg/dhcp_options select Continue without network
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/get_hostname string gatekeeper
d-i netcfg/get_domain string local
d-i netcfg/no_interfaces boolean true
d-i netcfg/enable boolean false

# 镜像源 - 离线安装，不配置网络镜像
d-i mirror/country string manual
d-i mirror/http/hostname string
# 禁用网络镜像，使用本地介质
d-i apt-setup/use_mirror boolean false
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/use_cdrom boolean false

# 包含非自由固件（网卡驱动）
d-i hw-detect/load_firmware boolean true

# 时区
d-i time/zone string Asia/Shanghai
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean true

# 分区配置 - 完全自动分区（使用整个磁盘，无任何交互）
d-i partman-auto/method string regular
d-i partman-auto/disk string /dev/sda
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman/confirm_write_new_label boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman-partitioning/confirm_new_label boolean true
d-i partman-md/confirm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

# 用户配置
d-i passwd/root-login boolean true
d-i passwd/root-password-crypted password \$6\$Kje5KDszAqndHpxg\$T4Tye2dN5ZTZmvxSBMKUd9HO3W1QEBg6hRl4cVHZQU8g9enW1Zn0H3FgjgNjYHLGBshzxyZvvVELRYBDMW/pZ1
d-i passwd/user-fullname string GateKeeper Admin
d-i passwd/username string gkadmin
d-i passwd/user-password-crypted password \$6\$4E1ray97FgnjgE5t\$wLcVGG0ZUgF0lmGpBjnb.Lm1j6UsRYlp5bGB8T31uWuzA9CgLyeAW3ZcznrG/A8rvl.Qug3/HXdQ3v7TwNV8I0
d-i passwd/user-default-groups string sudo,adm,cdrom,dip,plugdev,netdev

# 软件包选择 - 极简安装，仅 SSH 服务器
tasksel tasksel/first multiselect ssh-server
d-i pkgsel/include string python3,python3-pip,python3-venv,git,curl,wget,net-tools,iproute2,iptables,sudo
d-i pkgsel/upgrade select none
d-i pkgsel/update-policy select none

# 引导加载器
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default
d-i debian-installer/add-kernel-opts string net.ifnames=0 biosdevname=0

# 禁用安全源探测
d-i apt-setup/security_host string
d-i apt-setup/services-select multiselect

# 完成安装
d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean false

# Early command - 检测并挂载USB设备到/cdrom
d-i preseed/early_command string mkdir -p /cdrom; for dev in /dev/sdb /dev/sdc /dev/sdd /dev/sde; do mount -o ro \$dev /cdrom 2>/dev/null && break; done; if [ ! -f /cdrom/preseed.cfg ]; then for dev in /dev/sdb1 /dev/sdc1 /dev/sdd1 /dev/sde1; do mount -o ro \$dev /cdrom 2>/dev/null && break; done; fi; echo "/cdrom" > /var/lib/cdrom-identification 2>/dev/null || true

# 禁用软驱检测
d-i hw-detect/floppy_detected boolean false

# Late command - 执行安装后脚本
d-i preseed/late_command string if [ -f /cdrom/late-command.sh ]; then cp /cdrom/late-command.sh /target/tmp/late-command.sh && chmod +x /target/tmp/late-command.sh && sh /target/tmp/late-command.sh; fi

# Popularity contest - 不参与
popularity-contest popularity-contest/participate boolean false
