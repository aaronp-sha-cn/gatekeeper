# ============================================================
# GateKeeper - Debian Preseed 自动化配置
# 用于 Debian 10 (Buster) 通过 USB (isohybrid) 完全离线安装
# ============================================================
#
# 关键说明：
# - 完全离线安装，不依赖网络，所有包从 ISO 内置仓库安装
# - ISO 包含完整的 pool/ 和 dists/ 目录（388个 .deb 包）
# - ISO 通过 isohybrid 处理后，USB 被内核识别为 /dev/sr0（光驱设备）
# - 所有交互提示均设为自动确认，实现完全无人值守安装
# ============================================================

# ---- 语言和区域设置 ----
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# ---- 网络配置 ----
# 自动选择网络接口，DHCP 获取 IP
# DHCP 失败后不阻塞安装（完全离线安装不依赖网络）
d-i netcfg/choose_interface select auto
d-i netcfg/link_wait_timeout string 10
d-i netcfg/dhcp_timeout string 30
d-i netcfg/dhcp_failed note
d-i netcfg/dhcp_options select Retry network autoconfiguration
d-i netcfg/get_hostname string gatekeeper
d-i netcfg/get_domain string local

# ---- 镜像源配置 ----
# 使用 ISO 内置的本地仓库（完全离线安装）
d-i apt-setup/cdrom/set-first boolean true
d-i apt-setup/use_cdrom boolean true
d-i apt-setup/cdrom/set-double boolean true
d-i apt-setup/cdrom/set-next boolean true

# 禁用网络镜像（完全离线安装，不访问外部源）
d-i mirror/country string manual
d-i mirror/http/hostname string
d-i mirror/http/directory string
d-i apt-setup/use_mirror boolean false
d-i apt-setup/services-select multiselect
d-i apt-setup/security_host string

# ---- 固件 ----
d-i hw-detect/load_firmware boolean true
d-i hw-detect/floppy_detected boolean false

# ---- 时区 ----
d-i time/zone string Asia/Shanghai
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean false

# ---- 分区配置 ----
# 自动使用整个 /dev/sda 磁盘，所有确认项均为 true（完全无人值守）
d-i partman-auto/method string regular
d-i partman-auto/disk string /dev/sda
d-i partman-auto/choose_recipe select atomic
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman/confirm_write_new_label boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman-partitioning/confirm_new_label boolean true
d-i partman-md/confirm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

# ---- 用户配置 ----
d-i passwd/root-login boolean true
d-i passwd/root-password-crypted password $6$50MGz50Wy2aRc3wF$C9K.0dIiico62Qia3TCjlKfJeReDjRRRzJKJ40rqRbV9nNuO.Cqvmg5ZXEIPLxvZjAlX89buIcVZgtyANLdXX.
d-i passwd/user-fullname string GateKeeper Admin
d-i passwd/username string gkadmin
d-i passwd/user-password-crypted password $6$/XmHNISiYVZmDegU$G7l.fAw4Buxm.JVhrvBjq8dNQsH.X9qQssdmgF6s.lzOdKh3zxEK4R/Gt8617EmRZjfqsAB/3U/fRASxyGcnk1
d-i passwd/user-default-groups string sudo,adm,cdrom,dip,plugdev,netdev

# ---- 软件包选择 ----
# 只安装最小系统 + openssh-server，所有额外包由 first-start.sh 安装
tasksel tasksel/first multiselect
d-i pkgsel/include string openssh-server firmware-linux-nonfree firmware-iwlwifi firmware-atheros firmware-realtek firmware-libertas firmware-bnx2 firmware-misc-nonfree
d-i pkgsel/upgrade select none

# ---- 引导加载器配置 ----
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default
d-i grub-installer/skip boolean false

# grub-pc 预配置：指定安装到 /dev/sda，避免弹出交互界面
grub-pc grub-pc/install_devices string /dev/sda
grub-pc grub-pc/install_devices_empty boolean false

# 内核参数：使用传统网卡命名（eth0 而非 enp3s0）
d-i debian-installer/add-kernel-opts string net.ifnames=0 biosdevname=0

# ---- 完成安装 ----
d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean false

# ---- Popularity contest ----
popularity-contest popularity-contest/participate boolean false

# ---- Early command ----
# isohybrid 处理后 USB 被内核识别为 /dev/sr0（光驱设备）
d-i preseed/early_command string mount -o ro /dev/sr0 /cdrom || true

# ---- Late command ----
# 重新挂载 /dev/sr0 并执行 late-command.sh
d-i preseed/late_command string \
    mkdir -p /cdrom; \
    if mount -o ro /dev/sr0 /cdrom 2>/dev/null; then \
        echo "[late_command] Mounted /dev/sr0"; \
    else \
        echo "[late_command] WARNING: Failed to mount /dev/sr0, trying other devices..."; \
        for dev in /dev/sdb /dev/sdc /dev/sdd /dev/sde; do \
            mount -o ro $dev /cdrom 2>/dev/null && echo "[late_command] Mounted $dev" && break; \
        done; \
    fi; \
    if [ -f /cdrom/late-command.sh ]; then \
        cp /cdrom/late-command.sh /target/tmp/late-command.sh && \
        chmod +x /target/tmp/late-command.sh && \
        sh /target/tmp/late-command.sh; \
    else \
        echo "ERROR: late-command.sh not found on /cdrom"; \
    fi
