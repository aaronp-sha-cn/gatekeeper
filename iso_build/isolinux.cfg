# GateKeeper - 无人值守自动安装（USB/无CD-ROM支持）
default auto
prompt 0
timeout 1

label auto
    kernel /install.amd/vmlinuz
    append initrd=/install.amd/initrd.gz \
           priority=critical \
           preseed/file=/preseed.cfg \
           preseed/interactive=false \
           debian-installer/locale=en_US.UTF-8 \
           keyboard-configuration/xkb-keymap=us \
           net.ifnames=0 biosdevname=0 \
           cdrom-detect/load_media=false \
           cdrom-detect/try-usb=true \
           cdrom-detect/cdrom-detect=false \
           anna/choose_modules=network-console,ethdetect,netcfg,choose-mirror,download-installer,preseed \
           hw-detect/load_firmware=false \
           quiet loglevel=3 ---
