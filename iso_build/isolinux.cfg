# GateKeeper - 无人值守自动安装（USB/无CD-ROM支持）
default auto
prompt 0
timeout 1

label auto
    kernel /install.amd/vmlinuz
    append initrd=/install.amd/initrd.gz \
           priority=critical \
           preseed/file=/cdrom/preseed.cfg \
           preseed/interactive=false \
           preseed/early_command="sleep 3; for d in /dev/sr* /dev/scd* /dev/hd*; do mount -t iso9660 -o ro $d /cdrom 2>/dev/null && break; done; for d in /dev/sd[a-z] /dev/sd[a-z][0-9]; do mount -t iso9660 -o ro $d /cdrom 2>/dev/null && break; done; true" \
           net.ifnames=0 biosdevname=0 \
           quiet loglevel=3 ---
