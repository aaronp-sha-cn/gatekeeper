set default=0
set timeout=3

menuentry 'GateKeeper Auto Install' {
    linux    /install.amd/vmlinuz auto=true priority=critical \
             preseed/file=/preseed.cfg \
             preseed/interactive=false \
             net.ifnames=0 biosdevname=0 \
             cdrom-detect/try-usb=true cdrom-detect/cdrom-detect=false \
             quiet loglevel=3 ---
    initrd   /install.amd/initrd.gz
}

menuentry 'GateKeeper Install (Debug)' {
    linux    /install.amd/vmlinuz auto=true priority=low \
             preseed/file=/preseed.cfg \
             net.ifnames=0 biosdevname=0 \
             cdrom-detect/try-usb=true cdrom-detect/cdrom-detect=false ---
    initrd   /install.amd/initrd.gz
}
