set default=0
set timeout=3

menuentry "GateKeeper Auto Install" {
    linux    /install.amd/vmlinuz auto=true priority=critical preseed/file=/cdrom/preseed.cfg preseed/interactive=false net.ifnames=0 biosdevname=0 quiet loglevel=3 ---
    initrd   /install.amd/initrd.gz
}

menuentry "GateKeeper Install (Debug)" {
    linux    /install.amd/vmlinuz auto=true priority=low preseed/file=/cdrom/preseed.cfg net.ifnames=0 biosdevname=0 ---
    initrd   /install.amd/initrd.gz
}
